- name: AI-Driven Server Initialization
  hosts: all
  become: yes
  tasks:
    - name: "Step 1: Set Standardized Hostname"
      hostname:
        name: "{{ server_name | default('node-' + ansible_default_ipv4.address | replace('.', '-')) }}"

    - name: "Step 2: Create Required Directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /data/logs
        - /data/configs

    - name: "Step 3: Deploy Base Configuration"
      copy:
        content: "Generated by AIOps Agent on {{ ansible_date_time.date }}"
        dest: /etc/aiops-info.txt
        backup: yes
